{% extends "base.html" %}
{% block title %}Add Book{% endblock %}

{% block content %}
  <div class="section-header mb-3">
    <span class="section-title">
      <i class="bi bi-person-plus me-2"></i>Add New Book
    </span>
  </div>
<div class="d-flex justify-content-center">
  <div class="lms-card w-100">
    <form method="post">
      {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6">
                <label class="lms-form-label">Title</label>
                <input type="text" name="title" class="form-control lms-form-control" required>
            </div>
            <div class="col-md-6">
                <label class="lms-form-label">Author</label>
                <input type="text" name="author" class="form-control lms-form-control" required>
            </div>
            <div class="col-md-6">
                <label class="lms-form-label">Publication Year</label>
                {{ form.publication_year }}
            </div>
            <div class="col-md-6">
                <label class="lms-form-label">Total Copies</label>
                <input type="text" name="total_copies" class="form-control lms-form-control" required>
            </div>
            <div class="col-md-6">
                <label class="lms-form-label">Category</label>
                {{ form.category }}
            </div>
        </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-lms-primary">
                    <i class="bi bi-check-lg me-1"></i>Save member
                </button>
                <a href="" class="btn btn-lms-outline">Cancel</a>
            </div>
    </form>
  </div>
</div>
  
{% endblock %}
