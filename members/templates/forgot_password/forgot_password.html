{% extends "base.html" %}
{% load static %}

{% block title %}Forgot Password{% endblock %}

{% block full_page %}

<div class="login-page">
  <div class="login-card" style="max-width:400px;">

    <div class="login-logo"><i class="bi bi-shield-lock"></i></div>
    <div class="login-title">Reset your password</div>
    <div class="login-subtitle">Follow the steps to securely reset your password</div>

    <div class="step active" id="step1">
      <label class="lms-form-label" for="email">Email address</label>
      <input type="email" id="email" class="form-control lms-form-control mb-3" placeholder="you@example.com" required>
      <div class="text-muted-sm mb-2" id="msg1"></div>
      <button class="btn btn-lms-primary w-100" onclick="generateotp()">Generate OTP</button>
    </div>

    <div class="step" id="step2">
        <label class="lms-form-label" for="otp">Enter OTP sent to your email</label>
        <input type="text" id="otp" class="form-control lms-form-control mb-3" placeholder="6-digit code" maxlength="6" required>
        <div class="text-muted-sm mb-2" id="msg2"></div>
        <button class="btn btn-lms-primary w-100" onclick="verifyotp()">Verify OTP</button>
    </div>

    <div class="step" id="step3">
      <label class="lms-form-label" for="new_password">New password</label>
      <input type="password" id="new_password" class="form-control lms-form-control mb-3" placeholder="Enter new password" required>
      <label class="lms-form-label" for="confirm_password">Confirm password</label>
      <input type="password" id="confirm_password" class="form-control lms-form-control mb-3" placeholder="Re-enter new password" required>
      <div class="text-muted-sm mb-2" id="msg3"></div>
      <button class="btn btn-lms-primary w-100" onclick="submitpassword()">Submit Password</button>
    </div>

    <div class="text-center mt-3">
      <a href="{% url 'log_in' %}" class="text-muted-sm" style="text-decoration:none;">
        <i class="bi bi-arrow-left"></i> Back to login
      </a>
    </div>

  </div>
</div>

<script>


function generateotp() {
    var email = document.getElementById("email").value.trim();
    if (email == "") {
        alert("Enter your email");
        return;
    }
    alert("Sending OTP!");

    fetch("/generate_otp/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrftoken
        },
        body: JSON.stringify({
            email: email
        })
    })
    .then(function(res) {
        return res.json().then(function(data) {
            if (res.ok) {
                userEmail = email;
                console.log("1", data)
                document.getElementById("step1").classList.remove("active");
                document.getElementById("step2").classList.add("active");

            } else {
                console.log("2", data.error)
                alert(data.error);
            }
        });
    })
    .catch(function() {
        alert("Network Error");
    });
}

async function verifyotp() {
  var otp = document.getElementById("otp").value.trim();
  console.log("OTP : ", otp)
    if (!otp) { 
        alert("Please enter the OTP"); 
        return; 
    }
    const step2 = document.getElementById("step2");
    const step3 = document.getElementById("step3");

    fetch("/verify_otp/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrftoken
        },
        body: JSON.stringify({ 
            email: userEmail, 
            otp 
        })
    })
    .then(function(res) {
        return res.json().then(function(data) {
            if (res.ok) {
                console.log("1", data)
                step2.classList.remove("active");
                step3.classList.add("active");
            } else {
                console.log("2", data.error)
                alert(data.error);
            }
        });
    })
    .catch(function() {
        alert("Network Error");
    });
}


function submitpassword() {
  var pwd = document.getElementById("new_password").value;
  var confirmpwd = document.getElementById("confirm_password").value;

  if (!pwd || !confirmpwd) {
    alert("Please fill both fields");
    return;
  }

  if (pwd !== confirmpwd) {
    alert("Passwords do not match");
    return;
  }

  if (pwd.length < 3) {
    alert("Password must be at least 8 characters");
    return;
  }

  alert("Updating password!");

  fetch("/reset_password/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": csrftoken
    },
    body: JSON.stringify({
      email: userEmail,
      new_password: pwd
    })
  })
  .then(function(res) {
    return res.json().then(function(data) {
      return { ok: res.ok, data: data };
    });
  })
  .then(function(result) {
    if (result.ok) {
      alert("Password reset successful! Redirecting to login!");
      document.querySelector("#step3 button").disabled = true;

        setTimeout(function() {
            window.location.href = "/";
        }, 1500);

    } else {
      alert(result.data.error || "Failed to reset password");
    }
  })
  .catch(function() {
    alert("Network error. Try again.");
  });
}



function getCookie(name) {
    let cookies = document.cookie.split(";");
    for (let i = 0; i < cookies.length; i++) {
        let cookie = cookies[i].trim();

        if (cookie.startsWith(name + "=")) {
            return decodeURIComponent(cookie.substring(name.length + 1));
        }
    }
    return null;
}

var csrftoken = getCookie('csrftoken');

</script>

{% endblock %}
