{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'library_systems/css/library.css' %}">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo"><i class="bi bi-book-half"></i></div>
    <div class="login-title">Library Management</div>
    <div class="login-subtitle">Sign in to your account</div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger py-2 text-center" style="font-size:12px;">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
    {% if form.errors %}
      <div class="alert alert-danger py-2 text-center" style="font-size:12px;">
        Invalid username or password.
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="lms-form-label">Username</label>
        <input type="text" name="username" class="form-control lms-form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="mb-3">
        <label class="lms-form-label">Password</label>
        <input type="password" name="password" class="form-control lms-form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-lms-primary w-100 mt-1">Sign in</button>
    </form>

    <p class="text-center mt-3" style="font-size:11px;">
      <a href="{% url 'password_reset' %}" style="color:#185FA5;">Forgot password?</a>
    </p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
