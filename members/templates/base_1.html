{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}LibraryMS{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'library_systems/css/library.css' %}">

  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>
<body>

{% block full_page %}
<div class="topbar">
  <button class="tog" onclick="tog()"><i class="bi bi-list"></i></button>
  <a href="{% url 'dashboard_page' %}" class="brand"><i class="bi bi-book-half me-1"></i>LibraryMS</a>
  <div class="right">
    <a href="#"><i class="bi bi-person-circle me-1"></i>{{ request.user.username }}</a>
    <a href="{% url 'log_in' %}" style="color:#ffcdd2"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
  </div>
</div>

<div class="page" id="pg">
{% if messages %}
  {% for message in messages %}
    <script>
      alert("{{ message|escapejs }}");
    </script>
  {% endfor %}
{% endif %}

  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% endblock %}
</body>
</html>
